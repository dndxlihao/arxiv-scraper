<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="480" fill="url(#gradient)" filter="url(#shadow)"/>
  
  <!-- 纸张堆叠效果 -->
  <!-- 底层纸张 -->
  <rect x="256" y="320" width="512" height="384" rx="20" fill="#FFFFFF" opacity="0.3" transform="rotate(-5, 512, 512)"/>
  
  <!-- 中层纸张 -->
  <rect x="272" y="304" width="512" height="384" rx="20" fill="#FFFFFF" opacity="0.5" transform="rotate(-2.5, 512, 512)"/>
  
  <!-- 顶层纸张（主文档） -->
  <rect x="288" y="288" width="512" height="384" rx="20" fill="url(#paperGradient)" stroke="#E2E8F0" stroke-width="4" transform="rotate(0, 512, 512)"/>
  
  <!-- 文档内容 -->
  <!-- 标题行 -->
  <rect x="352" y="352" width="320" height="24" rx="4" fill="#3B82F6" opacity="0.7"/>
  
  <!-- 正文行 -->
  <rect x="352" y="400" width="384" height="12" rx="2" fill="#CBD5E1"/>
  <rect x="352" y="424" width="320" height="12" rx="2" fill="#CBD5E1"/>
  <rect x="352" y="448" width="288" height="12" rx="2" fill="#CBD5E1"/>
  
  <!-- 图表区域 -->
  <rect x="352" y="480" width="128" height="64" rx="8" fill="#10B981" opacity="0.3"/>
  <rect x="496" y="480" width="128" height="64" rx="8" fill="#F59E0B" opacity="0.3"/>
  <rect x="640" y="480" width="96" height="64" rx="8" fill="#8B5CF6" opacity="0.3"/>
  
  <!-- 引用标记 -->
  <circle cx="768" y="384" r="16" fill="#EF4444" opacity="0.7"/>
  <text x="768" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">[1]</text>
  
  <!-- 流动线条（代表 PaperFlow） -->
  <path d="M192,640 Q256,576 320,640 T448,576 T576,640 T704,576 T832,640" 
        fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  
  <!-- 应用名称 -->
  <text x="512" y="800" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" letter-spacing="2">
    PF
  </text>
  
  <!-- 装饰元素 -->
  <circle cx="192" cy="320" r="24" fill="#10B981" opacity="0.4"/>
  <circle cx="832" cy="320" r="20" fill="#F59E0B" opacity="0.4"/>
  <circle cx="192" cy="704" r="28" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="832" cy="704" r="32" fill="#EF4444" opacity="0.4"/>
  
  <!-- 高光效果 -->
  <circle cx="384" cy="384" r="64" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="640" cy="640" r="48" fill="#FFFFFF" opacity="0.1"/>
</svg></canvas></svg>